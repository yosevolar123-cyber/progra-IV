<nav 
  [class.scrolled]="isScrolled"
  class="fixed top-0 left-0 w-full z-50 transition-all duration-500 border-b border-transparent bg-transparent"
>
  <div class="max-w-container-max mx-auto px-6 md:px-margin-desktop h-20 flex items-center justify-between">
    
    <!-- Logo -->
    <a [routerLink]="['/']" class="flex items-center gap-2 group">
      <span class="material-symbols-outlined text-primary text-2xl group-hover:rotate-12 transition-transform duration-300">sports_motorsports</span>
      <span class="font-rajdhani font-bold text-lg md:text-xl tracking-[0.2em] text-gradient uppercase">
        Hirosima <span class="text-on-surface font-light">MotorsBike</span>
      </span>
    </a>

    <!-- Desktop Navigation Links -->
    <div class="hidden md:flex items-center gap-8">
      <a 
        [routerLink]="['/']" 
        fragment="marcas"
        class="font-technical text-xs tracking-widest text-outline hover:text-primary transition-colors duration-300 relative py-2 after:absolute after:bottom-0 after:left-0 after:w-full after:h-px after:bg-primary after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100"
      >
        MARCAS
      </a>
      <a 
        [routerLink]="['/catalogo']" 
        routerLinkActive="text-primary after:scale-x-100"
        [routerLinkActiveOptions]="{exact: true}"
        class="font-technical text-xs tracking-widest text-outline hover:text-primary transition-colors duration-300 relative py-2 after:absolute after:bottom-0 after:left-0 after:w-full after:h-px after:bg-primary after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100"
      >
        CATÁLOGO
      </a>
      <a 
        [routerLink]="['/']" 
        fragment="garantias"
        class="font-technical text-xs tracking-widest text-outline hover:text-primary transition-colors duration-300 relative py-2 after:absolute after:bottom-0 after:left-0 after:w-full after:h-px after:bg-primary after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100"
      >
        GARANTÍAS
      </a>
      <a 
        [routerLink]="['/']" 
        fragment="contacto"
        class="font-technical text-xs tracking-widest text-outline hover:text-primary transition-colors duration-300 relative py-2 after:absolute after:bottom-0 after:left-0 after:w-full after:h-px after:bg-primary after:scale-x-0 after:origin-left after:transition-transform after:duration-300 hover:after:scale-x-100"
      >
        CONTACTO
      </a>
    </div>

    <!-- Desktop CTA Button -->
    <div class="hidden md:block">
      <a [routerLink]="['/']" fragment="contacto" class="btn-primary py-2 px-5 text-xs tracking-widest">
        COTIZAR
      </a>
    </div>

    <!-- Mobile Menu Button -->
    <button 
      (click)="toggleMobileMenu()" 
      class="md:hidden flex items-center justify-center p-2 text-on-surface hover:text-primary transition-colors duration-300"
      aria-label="Toggle Menu"
    >
      <span class="material-symbols-outlined text-2xl">
        {{ isMobileMenuOpen ? 'close' : 'menu' }}
      </span>
    </button>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div 
    *ngIf="isMobileMenuOpen"
    class="md:hidden w-full bg-surface/95 border-b border-outline-variant/30 backdrop-blur-xl absolute top-20 left-0 overflow-hidden transition-all duration-300 ease-in-out z-40"
  >
    <div class="flex flex-col px-6 py-6 gap-6">
      <a 
        [routerLink]="['/']" 
        fragment="marcas" 
        (click)="closeMobileMenu()"
        class="font-technical text-sm tracking-widest text-outline hover:text-primary transition-colors duration-300 py-1"
      >
        MARCAS
      </a>
      <a 
        [routerLink]="['/catalogo']" 
        (click)="closeMobileMenu()"
        class="font-technical text-sm tracking-widest text-outline hover:text-primary transition-colors duration-300 py-1"
      >
        CATÁLOGO
      </a>
      <a 
        [routerLink]="['/']" 
        fragment="garantias" 
        (click)="closeMobileMenu()"
        class="font-technical text-sm tracking-widest text-outline hover:text-primary transition-colors duration-300 py-1"
      >
        GARANTÍAS
      </a>
      <a 
        [routerLink]="['/']" 
        fragment="contacto" 
        (click)="closeMobileMenu()"
        class="font-technical text-sm tracking-widest text-outline hover:text-primary transition-colors duration-300 py-1"
      >
        CONTACTO
      </a>
      
      <a 
        [routerLink]="['/']" 
        fragment="contacto" 
        (click)="closeMobileMenu()"
        class="btn-primary w-full text-center py-3 tracking-widest mt-2"
      >
        COTIZAR AHÓRA
      </a>
    </div>
  </div>
</nav>
